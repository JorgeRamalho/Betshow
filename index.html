<!--
  BetShow — estrutura:
  index.html (esta página)
    → src/main.tsx (TypeScript + React)
    → src/App.tsx (componentes React)
    → src/styles/global.css + *.css (estilos)
  Dev (Vite): npm run dev  |  Live Server: botão direito neste index.html → Open with Live Server
  Antes do Live Server rode: npm run live
-->
  
<!DOCTYPE html>  
<html lang="pt-BR">
  <head>    <meta charset="UTF-8" />
    <script id="live-server-redirect">
      (function () {
        var port = location.port;
        var path = location.pathname;
        var isVite =
          port === "5173" || port === "5174" || port === "4173";
        var isBuilt =
          path.includes("/dist/") || path.endsWith("/dist");
        if (
          !isVite &&
          !isBuilt &&
          (location.protocol === "http:" || location.protocol === "https:")
        ) {
          location.replace("./dist/index.html");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BetShow — apostas esportivas seguras, bônus exclusivos, cashback e cadastro com CPF verificado. Plataforma 100% regulada."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>BetShow — Apostas Esportivas Premium</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
