# Deploy automático no Netlify (produção)
# Build Settings devem usar este arquivo quando o site estiver linkado ao GitHub.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA React Router: todas as rotas caem no index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
